<!doctype html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Addon Settings - TurboWarp</title><style>body[data-splash-theme="dark"] {
        background: #111;
      }

      noscript {
        font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      }</style></head><body><noscript><h1>This page requires JavaScript</h1></noscript><script>(function() {
        var theme = '';

        try {
          var themeSetting = localStorage.getItem('tw:theme');
        } catch (e) {
          // ignore
        }
        if (themeSetting === 'light') {
          theme = 'light';
        } else if (themeSetting === 'dark') {
          theme = 'dark';
        } else if (themeSetting) {
          try {
            var parsed = JSON.parse(themeSetting);
            if (parsed.gui === 'dark' || parsed.gui === 'light') {
              theme = parsed.gui;
            }
          } catch (e) {
            // ignore
          }
        }

        if (!theme) {
          theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }

        document.body.setAttribute('data-splash-theme', theme);
      })();</script><div id="app"></div><script src="js/pentapod/vendors~addon-settings~credits~editor~embed~fullscreen~mindustry~player.9bdabe5f468304b17d8d.js"></script><script src="js/pentapod/vendors~addon-settings~credits~editor~embed~fullscreen~player.f4bd07ec47a4d96e1abd.js"></script><script src="js/pentapod/addon-settings~addons~editor~fullscreen~player.92154c3bd130f217252e.js"></script><script src="js/pentapod/addon-settings~embed.17dbc7faa826b39bead6.js"></script><script src="js/pentapod/addon-settings.09ca32ed2b5563531378.js"></script></body></html>
