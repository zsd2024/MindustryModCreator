name: Build TurboWarp & Commit

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: turbowarp-build
  cancel-in-progress: false

jobs:
  build-and-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: packages/turbowarp/package-lock.json

      - name: Copy to temp dir
        run: cp -r packages/turbowarp /tmp/turbowarp

      - name: Install dependencies
        run: npm ci
        working-directory: /tmp/turbowarp

      - name: Build TurboWarp
        run: NODE_ENV=production npm run build
        working-directory: /tmp/turbowarp

      - name: Copy build back
        run: |
          rm -rf packages/turbowarp/build packages/turbowarp/dist
          cp -r /tmp/turbowarp/build packages/turbowarp/
          cp -r /tmp/turbowarp/dist packages/turbowarp/

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add -f packages/turbowarp/build/ packages/turbowarp/dist/
          
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "build(turbowarp): 编译产物更新 [skip ci]

            编译信息:
            - 触发者: ${{ github.actor }}
            - 运行编号: ${{ github.run_number }}
            - 提交 SHA: ${{ github.sha }}"
            
            git push
          fi
