name: Build TurboWarp & Commit

on:
  workflow_dispatch:
    inputs:
      turbowarp_ref:
        description: 'TurboWarp git ref (branch/tag/commit)'
        required: false
        default: 'develop'
        type: string

concurrency:
  group: turbowarp-build
  cancel-in-progress: false

jobs:
  build-and-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # - name: Setup Node.js
      #   uses: actions/setup-node@v4
      #   with:
      #     node-version: '24'
      #     cache: 'npm'
      #     cache-dependency-path: packages/turbowarp/package-lock.json

      - name: Install dependencies
        working-directory: packages/turbowarp
        run: npm ci --prefer-offline --no-audit

      - name: Build TurboWarp
        working-directory: packages/turbowarp
        run: npm run build
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add packages/turbowarp/build/ packages/turbowarp/dist/
          
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "build(turbowarp): 编译产物更新 [skip ci]

            编译信息:
            - 触发者: ${{ github.actor }}
            - 运行编号: ${{ github.run_number }}
            - 提交 SHA: ${{ github.sha }}
            - TurboWarp ref: ${{ inputs.turbowarp_ref || 'develop' }}"
            
            git push
          fi
